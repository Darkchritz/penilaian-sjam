<!doctype html><html><head><title>Dashboard Kadiv</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head><body><div class="container mt-4">
<h3>Halo, {{user.nama}} - {{user.divisi}}</h3>
<a href="/logout" class="btn btn-sm btn-danger float-end">Logout</a><hr>
<h5>Input Nilai Karyawan</h5>
<form method="POST" action="/finalisasi" class="row g-2">
<div class="col-md-2"><input name="npk" class="form-control" placeholder="NPK" required></div>
<div class="col-md-2"><select name="periode" class="form-control">
<option>Q1 2026</option><option>Q2 2026</option><option>Q3 2026</option><option>Q4 2026</option>
</select></div>
<div class="col-md-2"><input name="nilai_akhir" type="number" step="0.1" class="form-control" placeholder="Nilai 0-100" required></div>
<div class="col-md-4"><input name="keterangan" class="form-control" placeholder="Keterangan"></div>
<div class="col-md-2"><button class="btn btn-success w-100">Finalisasi</button></div>
</form>
</div></body></html>
