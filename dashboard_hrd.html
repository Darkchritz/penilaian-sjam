<!doctype html><html><head><title>Dashboard HRD</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head><body><div class="container mt-4">
<h3>Dashboard HRD - Rekap Penilaian</h3>
<a href="/export_excel" class="btn btn-success btn-sm">Export Excel</a>
<a href="/logout" class="btn btn-danger btn-sm float-end">Logout</a><hr>
<table class="table table-striped"><thead><tr>
<th>NPK</th><th>Nama</th><th>Divisi</th><th>Periode</th><th>Nilai</th><th>Grade</th><th>Status</th>
</tr></thead><tbody>
{% for d in data %}
<tr><td>{{d.npk}}</td><td>{{d.nama}}</td><td>{{d.divisi}}</td><td>{{d.periode}}</td>
<td>{{d.nilai_akhir}}</td><td>{{d.grade}}</td><td>{{d.status}}</td></tr>
{% endfor %}
</tbody></table>
</div></body></html>
