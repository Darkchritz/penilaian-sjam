<!doctype html><html><head><title>Dashboard Karyawan</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head><body><div class="container mt-4">
<h3>Halo, {{user.nama}}</h3>
<a href="/logout" class="btn btn-sm btn-danger float-end">Logout</a><hr>
<h5>Riwayat Nilai Kamu</h5>
<table class="table"><thead><tr><th>Periode</th><th>Nilai Akhir</th><th>Grade</th><th>Keterangan</th></tr></thead><tbody>
{% for h in hasil %}
<tr><td>{{h.periode}}</td><td>{{h.nilai_akhir}}</td><td>{{h.grade}}</td><td>{{h.keterangan}}</td></tr>
{% endfor %}
</tbody></table>
</div></body></html>
