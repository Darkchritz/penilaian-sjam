<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SJAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'); body { font-family: 'Poppins', sans-serif; }</style>
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="SJAM">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/static/sw.js').catch(err => console.log('SW error', err));
        });
      }
    </script>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/80 backdrop-blur-lg p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="bi bi-building text-3xl text-indigo-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">SJAM Penilaian</h1>
            <p class="text-gray-500 text-sm">PT Suracojaya Abadimotor</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}{% for category, message in messages %}
            <div class="mb-6 p-4 rounded-xl {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-green-50 text-green-700 border border-green-200{% endif %} flex items-center gap-3">
              <i class="bi {% if category == 'error' %}bi-exclamation-circle{% else %}bi-check-circle{% endif %}"></i>
              {{ message }}
            </div>
          {% endfor %}{% endif %}
        {% endwith %}

        <form method="POST" action="/login" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">NPK</label>
                <div class="relative">
                    <i class="bi bi-person absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="npk" name="npk" required class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" placeholder="Masukkan NPK">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <div class="relative">
                    <i class="bi bi-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input id="password" name="password" type="password" required class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" placeholder="Masukkan password">
                </div>
            </div>
            <!-- TAMBAH CHECKBOX INI -->
            <div class="flex items-center">
                <input id="remember" name="remember" type="checkbox" class="h-4 w-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500">
                <label for="remember" class="ml-2 block text-sm text-gray-700">Ingat saya</label>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white py-3 rounded-xl font-semibold transition shadow-lg shadow-indigo-500/30">
                <i class="bi bi-box-arrow-in-right"></i> Masuk
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-600">
            Belum punya akun? <a href="/register" class="text-indigo-600 hover:text-indigo-800 font-semibold">Daftar di sini</a>
        </p>
    </div>

    <!-- TAMBAH JS INI SEBELUM </body> -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const npkInput = document.getElementById('npk');
        const passwordInput = document.getElementById('password');
        const rememberCheckbox = document.getElementById('remember');
        const loginForm = document.querySelector('form');

        // Pas load, isi dari localStorage kalo ada
        const savedNPK = localStorage.getItem('savedNPK');
        const savedPassword = localStorage.getItem('savedPassword');
        
        if (savedNPK && savedPassword) {
            npkInput.value = savedNPK;
            passwordInput.value = savedPassword;
            rememberCheckbox.checked = true;
        }

        // Pas submit, simpen ke localStorage kalo dicentang
        loginForm.addEventListener('submit', function() {
            if (rememberCheckbox.checked) {
                localStorage.setItem('savedNPK', npkInput.value);
                localStorage.setItem('savedPassword', passwordInput.value);
            } else {
                localStorage.removeItem('savedNPK');
                localStorage.removeItem('savedPassword');
            }
        });
    });
    </script>
</body>
</html>
