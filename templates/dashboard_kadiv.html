<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kadiv | SJA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'); body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <h1 class="text-xl font-bold text-indigo-600">SJA Penilaian</h1>
                <div class="flex items-center gap-4">
                    <span class="text-gray-700">Hi, {{ user.nama }}</span>
                    <a href="/logout" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Dashboard Kepala Divisi</h2>
            <p class="text-gray-500">Divisi: {{ user.divisi }}</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">Form Finalisasi Penilaian</h3>
            <form action="/finalisasi" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input name="npk" placeholder="NPK Karyawan" class="px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500" required>
                <input name="periode" placeholder="Periode: 2026-Q1" class="px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500" required>
                <input name="nilai_akhir" type="number" step="0.01" placeholder="Nilai Akhir 0-100" class="px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500" required>
                <input name="keterangan" placeholder="Keterangan" class="px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500">
                <button type="submit" class="md:col-span-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition">Finalisasi Nilai</button>
            </form>
        </div>
    </main>
</body>
</html>
