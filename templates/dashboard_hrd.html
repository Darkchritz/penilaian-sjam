<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard HRD | SJA</title><script src="https://cdn.tailwindcss.com"></script>
<style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'); body { font-family: 'Poppins', sans-serif; }</style>
</head><body class="bg-gray-50 min-h-screen">
<nav class="bg-white shadow-sm border-b"><div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
<h1 class="text-xl font-bold text-indigo-600">SJA Penilaian</h1>
<div class="flex items-center gap-4"><span class="text-gray-700">HRD Admin</span>
<a href="/logout" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm">Logout</a></div></div></nav>
<main class="max-w-7xl mx-auto p-6">
<div class="bg-white rounded-xl shadow-sm p-6 mb-6 flex justify-between items-center">
<h2 class="text-2xl font-bold text-gray-800">Rekap Penilaian</h2>
<a href="/export_excel" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium">Export Excel</a></div>
<div class="bg-white rounded-xl shadow-sm overflow-hidden">
<table class="w-full"><thead class="bg-gray-50"><tr>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">NPK</th>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nama</th>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Divisi</th>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Periode</th>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nilai</th>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Grade</th>
</tr></thead><tbody class="divide-y divide-gray-200">
{% for row in data %}
<tr class="hover:bg-gray-50"><td class="px-6 py-4 text-sm">{{ row.npk }}</td>
<td class="px-6 py-4 text-sm font-medium">{{ row.nama }}</td>
<td class="px-6 py-4 text-sm">{{ row.divisi }}</td>
<td class="px-6 py-4 text-sm">{{ row.periode }}</td>
<td class="px-6 py-4 text-sm font-semibold">{{ row.nilai_akhir }}</td>
<td class="px-6 py-4"><span class="px-2 py-1 text-xs font-semibold rounded-full bg-indigo-100 text-indigo-800">{{ row.grade }}</span></td></tr>
{% endfor %}</tbody></table></div></main></body></html>
