{% extends "base.html" %}
{% block content %}
<div class="container mt-4 max-w-2xl">
    <h3 class="text-2xl font-bold mb-4">Tambah Karyawan Baru</h3>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} mb-4">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('tambah_karyawan') }}" class="space-y-4 bg-white p-6 rounded-xl shadow">
        <input name="npk" type="number" required class="w-full px-4 py-3 rounded-xl border" placeholder="NPK">
        <input name="nama" required class="w-full px-4 py-3 rounded-xl border" placeholder="Nama Lengkap">
        <select name="role" required class="w-full px-4 py-3 rounded-xl border">
            <option value="">Pilih Role</option>
            <option value="karyawan">Karyawan</option>
            <option value="kadiv">Kepala Divisi</option>
            <option value="hrd">HRD</option>
        </select>
        <input name="divisi" required class="w-full px-4 py-3 rounded-xl border" placeholder="Divisi">
        <input name="cabang" required class="w-full px-4 py-3 rounded-xl border" placeholder="Cabang">
        <input name="password" type="password" class="w-full px-4 py-3 rounded-xl border" placeholder="Password - kosong = 123456">
        <div class="flex gap-3">
            <button type="submit" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-semibold">Simpan</button>
            <a href="{{ url_for('hrd') }}" class="flex-1 text-center border py-3 rounded-xl">Batal</a>
        </div>
    </form>
</div>
{% endblock %}
