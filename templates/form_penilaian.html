<!DOCTYPE html>
<html>
<head>
    <title>Penilaian SJAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h3>Form Penilaian: {{ karyawan.nama }}</h3>
    <p>NPK: {{ karyawan.npk }} | Divisi: {{ karyawan.divisi }} | Cabang: {{ karyawan.cabang }}</p>
    
    <form method="POST" action="/submit_nilai">
        <input type="hidden" name="npk" value="{{ karyawan.npk }}">
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Tanggung Jawab</label>
                <input type="number" name="tanggung_jawab" class="form-control" min="1" max="5" value="{{ draft.tanggung_jawab or '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Inisiatif</label>
                <input type="number" name="inisiatif" class="form-control" min="1" max="5" value="{{ draft.inisiatif or '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Kerjasama</label>
                <input type="number" name="kerjasama" class="form-control" min="1" max="5" value="{{ draft.kerjasama or '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Kedisiplinan</label>
                <input type="number" name="kedisiplinan" class="form-control" min="1" max="5" value="{{ draft.kedisiplinan or '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Kemampuan</label>
                <input type="number" name="kemampuan" class="form-control" min="1" max="5" value="{{ draft.kemampuan or '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Target</label>
                <input type="number" name="target" class="form-control" min="1" max="5" value="{{ draft.target or '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Proses</label>
                <input type="number" name="proses" class="form-control" min="1" max="5" value="{{ draft.proses or '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Inovasi</label>
                <input type="number" name="inovasi" class="form-control" min="1" max="5" value="{{ draft.inovasi or '' }}" required>
            </div>
        </div>
        
        <button type="submit" name="action" value="draft" class="btn btn-secondary">Simpan Draft</button>
        <button type="submit" name="action" value="final" class="btn btn-primary">Submit Final</button>
        <a href="/dashboard" class="btn btn-light">Kembali</a>
    </form>
</div>
</body>
</html>
