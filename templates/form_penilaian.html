<!DOCTYPE html>
<html>
<head>
    <title>Form Penilaian</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <h2>Form Penilaian: {{ karyawan.nama }}</h2>
    <p>NPK: {{ karyawan.npk }} | Divisi: {{ karyawan.divisi }}</p>
    
    <form method="POST" action="/submit_nilai">
        <input type="hidden" name="npk" value="{{ karyawan.npk }}">
        
        <label>Tanggung Jawab 1-5:</label><br>
        <input type="number" name="tanggung_jawab" min="1" max="5" required value="{{ draft.tanggung_jawab if draft else '' }}"><br><br>
        
        <label>Inisiatif 1-5:</label><br>
        <input type="number" name="inisiatif" min="1" max="5" required value="{{ draft.inisiatif if draft else '' }}"><br><br>
        
        <label>Kerjasama 1-5:</label><br>
        <input type="number" name="kerjasama" min="1" max="5" required value="{{ draft.kerjasama if draft else '' }}"><br><br>
        
        <label>Kedisiplinan 1-5:</label><br>
        <input type="number" name="kedisiplinan" min="1" max="5" required value="{{ draft.kedisiplinan if draft else '' }}"><br><br>
        
        <label>Kemampuan 1-5:</label><br>
        <input type="number" name="kemampuan" min="1" max="5" required value="{{ draft.kemampuan if draft else '' }}"><br><br>
        
        <label>Target 1-5:</label><br>
        <input type="number" name="target" min="1" max="5" required value="{{ draft.target if draft else '' }}"><br><br>
        
        <label>Proses 1-5:</label><br>
        <input type="number" name="proses" min="1" max="5" required value="{{ draft.proses if draft else '' }}"><br><br>
        
        <label>Inovasi 1-5:</label><br>
        <input type="number" name="inovasi" min="1" max="5" required value="{{ draft.inovasi if draft else '' }}"><br><br>
        
        <button type="submit" name="action" value="draft">Simpan Draft</button>
        <button type="submit" name="action" value="final">Submit Final</button>
    </form>
</body>
</html>
