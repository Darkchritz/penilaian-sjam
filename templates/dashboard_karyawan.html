<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Karyawan | SJA</title><script src="https://cdn.tailwindcss.com"></script>
<style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'); body { font-family: 'Poppins', sans-serif; }</style>
</head><body class="bg-gray-50 min-h-screen">
<nav class="bg-white shadow-sm border-b"><div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
<h1 class="text-xl font-bold text-indigo-600">SJA Penilaian</h1>
<div class="flex items-center gap-4"><span class="text-gray-700">{{ user.nama }}</span>
<a href="/logout" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm">Logout</a></div></div></nav>
<main class="max-w-4xl mx-auto p-6">
<div class="bg-white rounded-xl shadow-sm p-6 mb-6">
<h2 class="text-2xl font-bold text-gray-800">Riwayat Penilaian</h2>
<p class="text-gray-500">NPK: {{ user.npk }} | Divisi: {{ user.divisi }}</p></div>
<div class="space-y-4">
{% for h in hasil %}
<div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-indigo-500">
<div class="flex justify-between items-start"><div>
<h3 class="text-lg font-semibold text-gray-800">Periode {{ h.periode }}</h3>
<p class="text-gray-500 text-sm">Finalisasi: {{ h.tgl_finalisasi }}</p></div>
<div class="text-right"><div class="text-3xl font-bold text-indigo-600">{{ h.nilai_akhir }}</div>
<span class="px-3 py-1 text-sm font-semibold rounded-full bg-indigo-100 text-indigo-800">Grade {{ h.grade }}</span></div></div>
<p class="mt-4 text-gray-700">{{ h.keterangan }}</p></div>
{% else %}
<div class="bg-white rounded-xl shadow-sm p-6 text-center text-gray-500">Belum ada data penilaian</div>
{% endfor %}</div></main></body></html>
